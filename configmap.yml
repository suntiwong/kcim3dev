spring:
  application:
    name: auth-service

  main:
    allow-bean-definition-overriding: true

  profiles:
    active: k8s

  datasource:
    kcim:
      initialization-mode: always
      driverClassName: org.postgresql.Driver
      jdbcUrl: jdbc:postgresql://192.168.0.248:5432/kcimdbu
      username: ciadm
      password: ciadm@

    kcc:
      initialization-mode: always
      driverClassName: org.postgresql.Driver
      jdbcUrl: jdbc:postgresql://192.168.0.248:5432/kcimdbu
      username: ciadm
      password: ciadm@

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  redis:
    database: 0
    password: redis@
    timeout: 60000
    sentinel:
      master: redis-cluster
      nodes:
        - 10.8.52.191:16379
        - 10.8.52.192:16380
        - 10.8.52.193:16381

  cache:
    type: redis
    redis:
      key-prefix: prod
      use-key-prefix: true
      time-to-live: 1800000

dbname:
  kcim: kcim
  kcc: kcc

management:
  endpoints:
    web:
      exposure:
        include: "*"

services:
  second: http://cim2

