apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kcim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        ports:
        - containerPort: 9090
        envFrom:
        - configMapRef:
            name: auth-service-config
        - secretRef:
            name: auth-service-ldap-secret
