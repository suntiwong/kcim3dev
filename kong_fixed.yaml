_format_version: "2.1"

consumers:

* username: kcc
  custom_id: kcc
* username: iamusr
  custom_id: iamusr

basicauth_credentials:

* consumer: kcc
  username: kcc
  password: "Kcc@123!"
* consumer: iamusr
  username: iamusr
  password: "iamusr@123!"

services:

# ================= AUTH =================

* name: auth-service
  protocol: http
  host: auth-service.kcim.svc.cluster.local
  port: 9090
  routes:

  * name: auth-route
    paths:

    * /api/auth
      strip_path: false

* name: authen-detail-service
  protocol: http
  host: auth-service.kcim.svc.cluster.local
  port: 9090
  plugins:

  * name: custom-auth
    config:
    authVerifyTokenEndpoint: http://auth-service.kcim.svc.cluster.local:9090/verifyToken
    routes:
  * name: auth-detail-route
    paths:

    * /api/auth-detail
      strip_path: false

