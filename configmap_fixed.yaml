apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: kcim
data:
  # ===== LDAP CONFIG =====
  SPRING_LDAP_URLS: ldap://192.168.0.59:389
  SPRING_LDAP_BASE: dc=kgs,dc=co,dc=th

  # AD user search
  SPRING_SECURITY_LDAP_USER_SEARCH_BASE: ou=people,ou=kcim2,ou=kcs
  SPRING_SECURITY_LDAP_USER_SEARCH_FILTER: (sAMAccountName={0})

  # Optional debug
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_LDAP: DEBUG

  # ===== OPTIONAL DATABASE FIX =====
  SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_LOB_NON_CONTEXTUAL_CREATION: "true"
