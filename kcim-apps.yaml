apiVersion: v1
kind: Namespace
metadata:
  name: kcim
---
# ============================================================
# admin-service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: kcim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: admin-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9095
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: kcim
spec:
  type: ClusterIP
  selector:
    app: admin-service
  ports:
    - name: http
      port: 9095
      targetPort: 9095
---
# ============================================================
# auth-service Service only
# (Deployment is defined in auth-service-deployment.yaml
#  to avoid duplicate manifests in ArgoCD)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kcim
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
# ============================================================
# ccms-service
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccms-service
  namespace: kcim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ccms-service
  template:
    metadata:
      labels:
        app: ccms-service
    spec:
      containers:
        - name: ccms-service
          image: ccms-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9093
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_NAME
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_PASS
---
apiVersion: v1
kind: Service
metadata:
  name: ccms-service
  namespace: kcim
spec:
  type: ClusterIP
  selector:
    app: ccms-service
  ports:
    - name: http
      port: 9093
      targetPort: 9093
---
# ============================================================
