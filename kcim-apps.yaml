---
# ============================================================
# kcim3-web Service only
# (Deployment is defined in kcim3-web-deploy.yaml
#  which mounts the nginx ConfigMap for /api/ proxy)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: kcim3-web
  namespace: kcim
spec:
  type: ClusterIP
  selector:
    app: kcim3-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# ============================================================
